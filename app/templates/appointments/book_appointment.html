<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Doctor Appointment - MedCare Diagnostic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #f8f9fa; }
        .appointment-card { background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .header-section { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); color: white; padding: 30px; border-radius: 15px 15px 0 0; }
        .doctor-card { border: 2px solid #e9ecef; border-radius: 10px; padding: 20px; margin-bottom: 15px; cursor: pointer; }
        .doctor-card:hover { border-color: #059669; }
        .doctor-card.selected { border-color: #059669; background: #f0fdf4; }
        .time-slot { border: 2px solid #e9ecef; border-radius: 8px; padding: 10px 15px; margin: 5px; cursor: pointer; }
        .time-slot.selected { border-color: #059669; background: #059669; color: white; }
        .btn-book { background: linear-gradient(135deg, #059669 0%, #047857 100%); border: none; color: white; padding: 15px 40px; border-radius: 50px; }
    </style>
</head>
<body>
    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="appointment-card">
                    <div class="header-section text-center">
                        <h2><i class="fas fa-calendar-check me-2"></i>Book Doctor Appointment</h2>
                        <p class="mb-0">Schedule your consultation with our expert doctors</p>
                    </div>
                    
                    <div class="p-4">
                        <form method="POST">
                            <div class="mb-4">
                                <h5 class="text-primary mb-3">Patient Information</h5>
                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label">Full Name *</label>
                                        <input type="text" class="form-control" name="patient_name" required>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label">Phone Number *</label>
                                        <input type="tel" class="form-control" name="patient_phone" required>
                                    </div>
                                    <div class="col-md-12 mb-3">
                                        <label class="form-label">Email Address</label>
                                        <input type="email" class="form-control" name="patient_email">
                                    </div>
                                </div>
                            </div>

                            <div class="mb-4">
                                <h5 class="text-primary mb-3">Select Doctor</h5>
                                {% for doctor in doctors %}
                                <div class="doctor-card" onclick="selectDoctor({{ doctor.id }})">
                                    <div class="row align-items-center">
                                        <div class="col-md-8">
                                            <h6 class="mb-1">Dr. {{ doctor.doctor_name }}</h6>
                                            <p class="text-muted mb-0">{{ doctor.specialization or 'General Physician' }}</p>
                                        </div>
                                        <div class="col-md-4 text-end">
                                            <input class="form-check-input" type="radio" name="doctor_id" value="{{ doctor.id }}" id="doctor{{ doctor.id }}" required>
                                        </div>
                                    </div>
                                </div>
                                {% endfor %}
                            </div>

                            <div class="mb-4">
                                <h5 class="text-primary mb-3">Select Date & Time</h5>
                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label">Appointment Date *</label>
                                        <input type="date" class="form-control" name="appointment_date" required>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label">Appointment Time *</label>
                                        <select class="form-control" name="appointment_time" required>
                                            <option value="">Select Time</option>
                                            <option value="09:00">09:00 AM</option>
                                            <option value="09:30">09:30 AM</option>
                                            <option value="10:00">10:00 AM</option>
                                            <option value="10:30">10:30 AM</option>
                                            <option value="11:00">11:00 AM</option>
                                            <option value="11:30">11:30 AM</option>
                                            <option value="14:00">02:00 PM</option>
                                            <option value="14:30">02:30 PM</option>
                                            <option value="15:00">03:00 PM</option>
                                            <option value="15:30">03:30 PM</option>
                                            <option value="16:00">04:00 PM</option>
                                            <option value="16:30">04:30 PM</option>
                                        </select>
                                    </div>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label">Additional Notes</label>
                                <textarea class="form-control" name="notes" rows="3"></textarea>
                            </div>

                            <div class="text-center">
                                <button type="submit" class="btn btn-book btn-lg">
                                    <i class="fas fa-calendar-plus me-2"></i>Book Appointment
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.querySelector('input[name="appointment_date"]').min = new Date().toISOString().split('T')[0];
        
        function selectDoctor(doctorId) {
            // Remove selected class from all cards
            document.querySelectorAll('.doctor-card').forEach(card => {
                card.classList.remove('selected');
            });
            
            // Add selected class to clicked card
            event.currentTarget.classList.add('selected');
            
            // Check the radio button
            document.getElementById('doctor' + doctorId).checked = true;
        }
    </script>
</body>
</html>
