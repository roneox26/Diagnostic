{% extends 'base.html' %}

{% block title %}Add Doctor - Diagnostic Software{% endblock %}
{% block page_title %}Add New Doctor{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card shadow">
            <div class="card-header py-3">
                <h6 class="m-0 font-weight-bold text-primary">Doctor Information</h6>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="doctor_name" class="form-label">Doctor Name *</label>
                            <input type="text" class="form-control" id="doctor_name" name="doctor_name" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="specialization" class="form-label">Specialization</label>
                            <select class="form-control" id="specialization" name="specialization">
                                <option value="">Select Specialization</option>
                                <option value="Cardiologist">Cardiologist</option>
                                <option value="Neurologist">Neurologist</option>
                                <option value="Gynecologist">Gynecologist</option>
                                <option value="Pediatrician">Pediatrician</option>
                                <option value="Orthopedic">Orthopedic</option>
                                <option value="Dermatologist">Dermatologist</option>
                                <option value="ENT Specialist">ENT Specialist</option>
                                <option value="General Physician">General Physician</option>
                                <option value="Psychiatrist">Psychiatrist</option>
                                <option value="Urologist">Urologist</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="hospital_name" class="form-label">Hospital/Clinic Name</label>
                            <input type="text" class="form-control" id="hospital_name" name="hospital_name">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="phone" class="form-label">Phone Number</label>
                            <input type="tel" class="form-control" id="phone" name="phone">
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="commission_rate" class="form-label">Commission Rate (%)</label>
                            <input type="number" class="form-control" id="commission_rate" name="commission_rate" 
                                   min="0" max="100" step="0.1" value="0">
                        </div>
                    </div>
                    
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('frontend.doctors_list') }}" class="btn btn-secondary">
                            <i class="fas fa-arrow-left me-1"></i>Back to List
                        </a>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save me-1"></i>Save Doctor
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
