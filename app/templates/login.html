{% extends 'base.html' %}

{% block title %}Login - Advanced Healthcare Diagnostics{% endblock %}

{% block content %}
<div class="container-fluid h-100">
    <div class="row min-vh-100">
        <!-- Right Side - Login Form -->
        <div class="col-12 d-flex align-items-center justify-content-center bg-light">
            <div class="w-100" style="max-width: 400px;">
                <div class="card border-0 shadow-lg">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <div class="bg-primary bg-opacity-10 rounded-circle p-3 d-inline-flex mb-3">
                                <i class="fas fa-stethoscope fa-2x text-primary"></i>
                            </div>
                            <h3 class="fw-bold text-dark">Staff Portal</h3>
                            <p class="text-muted">Sign in to access your dashboard</p>
                        </div>

                        <form method="POST" action="{{ url_for('frontend.login') }}">
                            <div class="mb-3">
                                <label for="username" class="form-label fw-bold text-dark">Username</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0">
                                        <i class="fas fa-user text-muted"></i>
                                    </span>
                                    <input type="text" class="form-control border-start-0 ps-0" id="username" name="username" placeholder="Enter your username" required>
                                </div>
                            </div>
                            
                            <div class="mb-4">
                                <label for="password" class="form-label fw-bold text-dark">Password</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0">
                                        <i class="fas fa-lock text-muted"></i>
                                    </span>
                                    <input type="password" class="form-control border-start-0 ps-0" id="password" name="password" placeholder="Enter your password" required>
                                </div>
                            </div>

                            <div class="d-grid mb-3">
                                <button class="btn btn-primary py-3 fw-bold" type="submit" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none;">
                                    <i class="fas fa-sign-in-alt me-2"></i>Sign In
                                </button>
                            </div>
                        </form>

                        <div class="text-center">
                            <div class="bg-light rounded p-3">
                                <small class="text-muted d-block mb-1"><i class="fas fa-info-circle me-1"></i>Default Credentials</small>
                                <small class="text-dark fw-bold">admin / admin123</small>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="text-center mt-4">
                    <a href="{{ url_for('frontend.index') }}" class="text-decoration-none">
                        <i class="fas fa-arrow-left me-2"></i>Back to Home
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
